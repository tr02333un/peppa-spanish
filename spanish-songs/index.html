<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>追星學西語</title>
<style>
  :root{
    --deep:#001f3f;
    --deep2:#012a52;
    --deep3:#013a6e;
    --ice:#5CC8FF;
    --ice2:#8FE0FF;
    --bg:#020f22;
    --card:#062544;
    --text:#EAF6FF;
    --text-dim:#7FA3C9;
    --ok:#3DB87A;
    --err:#E05C5C;
    --type-action:#34D399;
    --type-who:#5CC8FF;
    --type-feeling:#F472B6;
    --type-where:#FBBF24;
    --type-connect:#2DD4BF;
    --type-phrase:#A5B4D9;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{max-width:100vw;overflow-x:hidden}
  body{
    margin:0;touch-action:manipulation;
    font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Microsoft JhengHei',sans-serif;
    background:var(--bg);color:var(--text);
    padding-bottom:120px;
    min-height:100vh;
  }
  .wrap{max-width:480px;margin:0 auto;padding:14px 14px 0}

  /* HEADER */
  .header{
    display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(135deg,var(--deep2),var(--deep));
    border:1px solid var(--deep3);border-radius:14px;
    padding:12px 14px;margin-bottom:14px;
  }
  .header-title{font-size:18px;font-weight:800;color:var(--ice2);display:flex;align-items:center;gap:8px}
  .header-stats{display:flex;gap:8px;font-size:12px;font-weight:700}
  .stat-pill{background:rgba(92,200,255,.12);border:1px solid var(--ice);color:var(--ice2);border-radius:20px;padding:4px 10px}

  /* STAGE TABS */
  .stage-tabs{display:flex;gap:8px;margin-bottom:10px}
  .stage-tab{
    flex:1;text-align:center;padding:9px 4px;border-radius:10px;
    background:var(--card);border:1px solid var(--deep3);color:var(--text-dim);
    font-size:12px;font-weight:800;cursor:pointer;transition:opacity .15s ease;
  }
  .stage-tab.active{background:var(--ice);color:#001f3f}

  .stage-card{
    background:var(--card);border:1px solid var(--deep3);border-radius:14px;
    padding:16px;margin-bottom:14px;min-height:160px;
  }
  .stage-card-title{font-size:13px;font-weight:800;color:var(--ice2);margin-bottom:10px}

  .fade{transition:opacity .15s ease}
  .fade-out{opacity:0}

  /* Stage 1 shuffle */
  .shuffle-list{display:flex;flex-direction:column;gap:8px}
  .shuffle-item{
    background:rgba(92,200,255,.06);border:1px solid var(--deep3);border-radius:10px;
    padding:10px 12px;cursor:pointer;
  }
  .shuffle-item .es{font-size:15px;font-weight:700;color:var(--text)}
  .shuffle-item .zh{font-size:12px;color:var(--text-dim);margin-top:2px}
  .btn-shuffle{
    width:100%;margin-top:12px;padding:11px;border-radius:11px;border:none;
    background:linear-gradient(135deg,var(--ice),#2E8FCC);color:#001f3f;
    font-size:13px;font-weight:900;cursor:pointer;
  }
  .btn-shuffle:active{transform:scale(.97)}

  /* Stage 2 tu/yo pair */
  .pair-block{margin-bottom:14px}
  .bubble-row{display:flex;margin-bottom:6px}
  .bubble-row.tu{justify-content:flex-start}
  .bubble-row.yo{justify-content:flex-end}
  .bubble{
    max-width:78%;padding:9px 13px;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;
  }
  .bubble .zh{display:block;font-size:11px;font-weight:500;opacity:.8;margin-top:2px}
  .bubble-row.tu .bubble{background:#3A4F6B;color:#D7E4F2;border-bottom-left-radius:4px}
  .bubble-row.yo .bubble{background:var(--ice);color:#001f3f;border-bottom-right-radius:4px}
  .bubble-tag{font-size:10px;font-weight:800;color:var(--text-dim);margin-bottom:3px}

  /* Stage 3 capsule combo */
  .combo-display{
    text-align:center;font-size:18px;font-weight:800;color:var(--ice2);
    background:rgba(92,200,255,.08);border:1px dashed var(--ice);border-radius:12px;
    padding:14px 10px;margin-bottom:14px;min-height:56px;display:flex;align-items:center;justify-content:center;
  }
  .capsule-row{margin-bottom:10px}
  .capsule-label{font-size:11px;font-weight:800;color:var(--text-dim);margin-bottom:6px}
  .capsule-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
  .capsule{
    flex:0 0 auto;padding:8px 14px;border-radius:20px;background:var(--deep2);
    border:1.5px solid var(--deep3);color:var(--text-dim);font-size:13px;font-weight:700;
    cursor:pointer;white-space:nowrap;transition:opacity .15s ease;
  }
  .capsule.selected{background:var(--ice);color:#001f3f;border-color:var(--ice2)}

  /* AMMO DOCK */
  .ammo-dock{
    position:fixed;left:0;right:0;bottom:0;max-width:100vw;
    background:linear-gradient(180deg,var(--deep2),var(--deep));
    border-top:1px solid var(--ice);
    box-shadow:0 -4px 18px rgba(0,0,0,.4);
    z-index:50;
  }
  .ammo-dock-inner{max-width:480px;margin:0 auto;padding:8px 12px 10px}
  .ammo-dock-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .ammo-dock-title{font-size:11px;font-weight:800;color:var(--ice2)}
  .ammo-dock-toggle{font-size:11px;color:var(--text-dim);font-weight:700;cursor:pointer}

  .chunk-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px}
  .chunk-pill{
    flex:0 0 auto;padding:6px 11px;border-radius:18px;font-size:12px;font-weight:800;
    cursor:pointer;border:1.5px solid transparent;display:flex;align-items:center;gap:4px;
    transition:opacity .15s ease;
  }
  .chunk-pill.action{background:rgba(52,211,153,.14);color:var(--type-action);border-color:var(--type-action)}
  .chunk-pill.who{background:rgba(92,200,255,.14);color:var(--type-who);border-color:var(--type-who)}
  .chunk-pill.feeling{background:rgba(244,114,182,.14);color:var(--type-feeling);border-color:var(--type-feeling)}
  .chunk-pill.where-when{background:rgba(251,191,36,.14);color:var(--type-where);border-color:var(--type-where)}
  .chunk-pill.connect{background:rgba(45,212,191,.14);color:var(--type-connect);border-color:var(--type-connect)}
  .chunk-pill.phrase{background:rgba(165,180,217,.14);color:var(--type-phrase);border-color:var(--type-phrase)}
  .chunk-pill.selected{outline:2px solid var(--ice2)}

  .ammo-expand{
    max-height:0;overflow:hidden;transition:max-height .15s ease;
  }
  .ammo-expand.open{max-height:260px;overflow-y:auto}
  .ammo-expand-inner{padding-top:8px}

  .pattern-list,.shot-list{display:flex;flex-direction:column;gap:6px}
  .pattern-item,.shot-item{
    background:rgba(92,200,255,.06);border:1px solid var(--deep3);border-radius:9px;
    padding:8px 11px;cursor:pointer;font-size:13px;font-weight:700;color:var(--text);
  }
  .pattern-item .zh,.shot-item .zh{font-size:11px;font-weight:500;color:var(--text-dim);margin-top:2px}
  .pattern-item.selected{border-color:var(--ice);background:rgba(92,200,255,.14)}
  .crumb{font-size:11px;color:var(--text-dim);font-weight:700;margin-bottom:6px;cursor:pointer}

  ::-webkit-scrollbar{height:0;width:0}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="header-title" id="headerTitle"></div>
    <div class="header-stats">
      <span class="stat-pill" id="xpPill">⚡ 0 XP</span>
      <span class="stat-pill" id="streakPill">🔥 0</span>
    </div>
  </div>

  <div class="stage-tabs" id="stageTabs"></div>

  <div class="stage-card" id="stageCard"></div>
</div>

<div class="ammo-dock" id="ammoDock">
  <div class="ammo-dock-inner">
    <div class="ammo-dock-head">
      <span class="ammo-dock-title" id="ammoDockTitle">🔫 語塊彈藥庫</span>
      <span class="ammo-dock-toggle" id="ammoToggle" onclick="closeAmmoExpand()">收合 ▲</span>
    </div>
    <div class="chunk-scroll" id="chunkScroll"></div>
    <div class="ammo-expand" id="ammoExpand">
      <div class="ammo-expand-inner" id="ammoExpandInner"></div>
    </div>
  </div>
</div>

<script>
/* ======================================================================
   SUB_PROJECT_DATA — 三個子專案（spanish-songs / bedtime-spanish /
   spanish-forge）唯一需要替換的資料物件。骨架程式碼（CSS/HTML/JS 邏輯）
   三個專案完全相同，只有這個物件的內容不同。
   ====================================================================== */
const SUB_PROJECT_DATA = {
  // 三選一固定值：spanish-songs / bedtime-spanish / spanish-forge
  // 同時也用來組 localStorage 的 STORAGE_KEY，避免三個子專案互相覆蓋進度
  project_name: "spanish-songs",

  // 顯示在頁首的中文標題
  project_title_zh: "追星學西語",

  // 頁首與彈藥庫共用的主題 emoji
  project_emoji: "🎵",

  // Stage 1~3 句型操練資料，完全比照主專案 ROUND12_FINAL 定案結構：
  //   stage 1 = mode:"shuffle"      → 整批洗牌 + 淡入淡出
  //   stage 2 = mode:"tu_yo_pair"   → Tú/Yo 對話泡泡
  //   stage 3 = mode:"capsule_combo"→ cores/verbs 左右膠囊拼接
  // 以下先留空白範例（每個 stage 只放 2-3 筆），之後依各專案主題替換內容
  pattern_stages: [
    {
      stage: 1,
      mode: "shuffle",
      title: "🔀 句型亂刷",
      items: [
        { es: "Me gusta esta canción.", zh: "我喜歡這首歌。" },
        { es: "Vamos a cantar juntos.", zh: "我們一起唱歌吧。" },
        { es: "¿Cuál es tu canción favorita?", zh: "你最喜歡的歌是哪一首？" }
      ]
    },
    {
      stage: 2,
      mode: "tu_yo_pair",
      title: "💬 Tú / Yo 對話",
      pairs: [
        {
          tu: { es: "¿Te gusta esta canción?", zh: "你喜歡這首歌嗎？" },
          yo: { es: "Sí, me encanta.", zh: "對啊，我超愛的。" }
        },
        {
          tu: { es: "¿Sabes bailar esta canción?", zh: "你會跳這首歌的舞嗎？" },
          yo: { es: "Un poco, estoy aprendiendo.", zh: "會一點，我在學。" }
        }
      ]
    },
    {
      stage: 3,
      mode: "capsule_combo",
      title: "🧩 膠囊拼句",
      cores: [
        { es: "Yo", zh: "我" },
        { es: "Tú", zh: "你" },
        { es: "Ella", zh: "她" }
      ],
      verbs: [
        { es: "canto esta canción.", zh: "唱這首歌。" },
        { es: "bailo con la música.", zh: "隨音樂跳舞。" },
        { es: "escucho este álbum.", zh: "聽這張專輯。" }
      ]
    }
  ],

  // 語塊彈藥庫三階資料：chunk → patterns → shots
  // emoji_type 六分類（沿用 ROUND8）：
  //   action🏃 / who👤 / feeling💭 / where-when📍 / connect🔗 / phrase📌
  ammo_chain: [
    {
      chunk: { es: "cantar", zh: "唱歌", emoji_type: "action" },
      patterns: [
        {
          pattern: "Vamos a [動詞] juntos.",
          pattern_zh: "我們一起來 [做某事]。",
          shots: [
            { es: "Vamos a cantar juntos.", zh: "我們一起唱歌吧。" },
            { es: "Vamos a bailar juntos.", zh: "我們一起跳舞吧。" }
          ]
        }
      ]
    },
    {
      chunk: { es: "me encanta", zh: "我超愛", emoji_type: "feeling" },
      patterns: [
        {
          pattern: "Me encanta [名詞].",
          pattern_zh: "我超愛 [某事物]。",
          shots: [
            { es: "Me encanta esta canción.", zh: "我超愛這首歌。" },
            { es: "Me encanta este cantante.", zh: "我超愛這個歌手。" }
          ]
        }
      ]
    }
  ]
};
/* ====================================================================== */

// ── STORAGE ──
const STORAGE_KEY = `peppa_es_${SUB_PROJECT_DATA.project_name}_progress_v1`;

function loadProgress(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : { xp: 0, streak: 0, lastVisit: null, completedShots: [] };
  }catch(e){
    return { xp: 0, streak: 0, lastVisit: null, completedShots: [] };
  }
}
function saveProgress(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }
  catch(e){ console.warn('Storage save failed', e); }
}
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}
function updateStreak(){
  const today = todayStr();
  if(progress.lastVisit === today) return;
  if(progress.lastVisit){
    const last = new Date(progress.lastVisit);
    const diffDays = Math.round((new Date(today) - last) / 86400000);
    progress.streak = diffDays === 1 ? progress.streak + 1 : 1;
  } else {
    progress.streak = 1;
  }
  progress.lastVisit = today;
  saveProgress();
}
function addXP(amount){
  progress.xp += amount;
  saveProgress();
  renderHeaderStats();
}

let progress = loadProgress();
updateStreak();
saveProgress();

// ── TTS（沿用主專案既有 speechSynthesis 規則，不新增任何語音辨識/錄音） ──
let ttsVoice = null;
function initTTS(){
  if(!window.speechSynthesis) return;
  function pickVoice(){
    const voices = speechSynthesis.getVoices();
    ttsVoice = voices.find(v=>v.lang==='es-ES') || voices.find(v=>v.lang==='es-MX') || voices.find(v=>v.lang.startsWith('es')) || null;
  }
  if(speechSynthesis.getVoices().length > 0) pickVoice();
  speechSynthesis.addEventListener('voiceschanged', pickVoice);
}
function speak(text){
  if(!window.speechSynthesis) return;
  const clean = text.replace(/[¡!¿?]/g,'').trim();
  if(!clean) return;
  try{ speechSynthesis.cancel(); }catch(e){}
  const utt = new SpeechSynthesisUtterance(clean);
  utt.lang = 'es-ES';
  utt.rate = 0.88;
  utt.pitch = 1.02;
  if(ttsVoice) utt.voice = ttsVoice;
  setTimeout(()=>{ try{ speechSynthesis.speak(utt); }catch(e){} }, 0);
}
initTTS();

// ── HEADER ──
function renderHeaderStats(){
  document.getElementById('xpPill').textContent = `⚡ ${progress.xp} XP`;
  document.getElementById('streakPill').textContent = `🔥 ${progress.streak}`;
}
document.getElementById('headerTitle').textContent = `${SUB_PROJECT_DATA.project_emoji} ${SUB_PROJECT_DATA.project_title_zh}`;
document.getElementById('ammoDockTitle').textContent = `🔫 語塊彈藥庫`;
renderHeaderStats();

// ── STAGE STATE ──
let state = {
  stage: 1,
  shuffleItems: [...SUB_PROJECT_DATA.pattern_stages.find(s=>s.mode==='shuffle').items],
  coreIdx: 0,
  verbIdx: 0
};

function shuffleArray(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderStageTabs(){
  const tabsEl = document.getElementById('stageTabs');
  tabsEl.innerHTML = SUB_PROJECT_DATA.pattern_stages.map(s =>
    `<div class="stage-tab ${state.stage===s.stage?'active':''}" onclick="switchStage(${s.stage})">Stage ${s.stage}</div>`
  ).join('');
}

function switchStage(n){
  state.stage = n;
  renderStageTabs();
  renderStageCard();
}

function renderStageCard(){
  const card = document.getElementById('stageCard');
  const data = SUB_PROJECT_DATA.pattern_stages.find(s => s.stage === state.stage);
  card.classList.add('fade-out');
  setTimeout(() => {
    card.innerHTML = buildStageHTML(data);
    card.classList.remove('fade-out');
  }, 150);
}

function buildStageHTML(data){
  if(data.mode === 'shuffle'){
    const rows = state.shuffleItems.map(it =>
      `<div class="shuffle-item" onclick="speak('${escAttr(it.es)}')">
        <div class="es">${it.es}</div>
        <div class="zh">${it.zh}</div>
      </div>`
    ).join('');
    return `<div class="stage-card-title">${data.title}</div>
      <div class="shuffle-list" id="shuffleList">${rows}</div>
      <button class="btn-shuffle" onclick="doShuffle()">¡隨機亂刷!</button>`;
  }
  if(data.mode === 'tu_yo_pair'){
    const rows = data.pairs.map(p => `
      <div class="pair-block">
        <div class="bubble-row tu">
          <div class="bubble" onclick="speak('${escAttr(p.tu.es)}')">
            <span class="bubble-tag">Tú</span>${p.tu.es}<span class="zh">${p.tu.zh}</span>
          </div>
        </div>
        <div class="bubble-row yo">
          <div class="bubble" onclick="speak('${escAttr(p.yo.es)}')">
            <span class="bubble-tag">Yo</span>${p.yo.es}<span class="zh">${p.yo.zh}</span>
          </div>
        </div>
      </div>`
    ).join('');
    return `<div class="stage-card-title">${data.title}</div>${rows}`;
  }
  if(data.mode === 'capsule_combo'){
    return `<div class="stage-card-title">${data.title}</div>
      <div class="combo-display" id="comboDisplay" onclick="speak('${escAttr(comboText(data))}')">${comboText(data)}</div>
      <div class="capsule-row">
        <div class="capsule-label">主詞</div>
        <div class="capsule-scroll" id="coreScroll">${data.cores.map((c,i)=>
          `<div class="capsule ${i===state.coreIdx?'selected':''}" onclick="selectCore(${i})">${c.es}</div>`).join('')}</div>
      </div>
      <div class="capsule-row">
        <div class="capsule-label">動作</div>
        <div class="capsule-scroll" id="verbScroll">${data.verbs.map((v,i)=>
          `<div class="capsule ${i===state.verbIdx?'selected':''}" onclick="selectVerb(${i})">${v.es}</div>`).join('')}</div>
      </div>`;
  }
  return '';
}

function comboText(data){
  return `${data.cores[state.coreIdx].es} ${data.verbs[state.verbIdx].es}`;
}

function selectCore(i){
  state.coreIdx = i;
  renderStageCard();
}
function selectVerb(i){
  state.verbIdx = i;
  renderStageCard();
}

function doShuffle(){
  const list = document.getElementById('shuffleList');
  list.classList.add('fade-out');
  setTimeout(() => {
    state.shuffleItems = shuffleArray(state.shuffleItems);
    const data = SUB_PROJECT_DATA.pattern_stages.find(s=>s.mode==='shuffle');
    list.innerHTML = state.shuffleItems.map(it =>
      `<div class="shuffle-item" onclick="speak('${escAttr(it.es)}')">
        <div class="es">${it.es}</div>
        <div class="zh">${it.zh}</div>
      </div>`
    ).join('');
    list.classList.remove('fade-out');
  }, 150);
}

// ── AMMO DOCK (3階：chunk → pattern → shots) ──
let ammoState = { chunkIdx: null, patternIdx: null, expanded: false };

function renderChunkScroll(){
  const el = document.getElementById('chunkScroll');
  el.innerHTML = SUB_PROJECT_DATA.ammo_chain.map((c, i) => {
    const icon = { action:'🏃', who:'👤', feeling:'💭', 'where-when':'📍', connect:'🔗', phrase:'📌' }[c.chunk.emoji_type] || '📌';
    return `<div class="chunk-pill ${c.chunk.emoji_type} ${ammoState.chunkIdx===i?'selected':''}" onclick="selectChunk(${i})">${icon} ${c.chunk.es}</div>`;
  }).join('');
}

function selectChunk(i){
  ammoState.chunkIdx = i;
  ammoState.patternIdx = null;
  ammoState.expanded = true;
  renderChunkScroll();
  renderAmmoExpand();
}

function selectPattern(i){
  ammoState.patternIdx = i;
  renderAmmoExpand();
}

function backToPatterns(){
  ammoState.patternIdx = null;
  renderAmmoExpand();
}

function closeAmmoExpand(){
  ammoState.expanded = !ammoState.expanded;
  const expandEl = document.getElementById('ammoExpand');
  const toggleEl = document.getElementById('ammoToggle');
  if(ammoState.expanded){
    expandEl.classList.add('open');
    toggleEl.textContent = '收合 ▲';
  } else {
    expandEl.classList.remove('open');
    toggleEl.textContent = '展開 ▼';
  }
}

function renderAmmoExpand(){
  const inner = document.getElementById('ammoExpandInner');
  const expandEl = document.getElementById('ammoExpand');
  const toggleEl = document.getElementById('ammoToggle');
  if(ammoState.chunkIdx === null){
    inner.innerHTML = '';
    return;
  }
  expandEl.classList.add('open');
  toggleEl.textContent = '收合 ▲';
  ammoState.expanded = true;

  const chunkData = SUB_PROJECT_DATA.ammo_chain[ammoState.chunkIdx];
  inner.classList.add('fade');

  if(ammoState.patternIdx === null){
    inner.innerHTML = `<div class="pattern-list">${chunkData.patterns.map((p,i)=>
      `<div class="pattern-item" onclick="selectPattern(${i})">
        <div>${p.pattern}</div>
        <div class="zh">${p.pattern_zh}</div>
      </div>`).join('')}</div>`;
  } else {
    const patternData = chunkData.patterns[ammoState.patternIdx];
    inner.innerHTML = `<div class="crumb" onclick="backToPatterns()">‹ 返回句型</div>
      <div class="shot-list">${patternData.shots.map((s,i)=>
        `<div class="shot-item" onclick="playShot('${escAttr(s.es)}', '${chunkKey(ammoState.chunkIdx, ammoState.patternIdx, i)}')">
          <div>${s.es}</div>
          <div class="zh">${s.zh}</div>
        </div>`).join('')}</div>`;
  }
}

function chunkKey(ci, pi, si){ return `${ci}-${pi}-${si}`; }

function playShot(es, key){
  speak(es);
  if(!progress.completedShots.includes(key)){
    progress.completedShots.push(key);
    addXP(10);
  }
}

function escAttr(s){
  return String(s).replace(/'/g, "\\'");
}

// ── INIT ──
renderStageTabs();
renderStageCard();
renderChunkScroll();
</script>
</body>
</html>
