<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>佩佩豬學西語 · 語塊彈藥庫</title>
<link rel="stylesheet" href="style.css?v=20260701">
</head>
<body>

  <div class="toast" id="toast"></div>

  <!-- HEADER -->
  <div class="header">
    <div class="header-title">🐷 Peppa <span>Español</span></div>
    <div class="ep-badge" id="epBadge">S1 · E1 · Charcos de Barro</div>
  </div>

  <!-- EPISODE NAV -->
  <div class="season-nav" id="seasonNav"></div>

  <!-- STAR PROGRESS -->
  <div class="star-progress">
    <div class="star-row" id="starRow"></div>
    <div class="star-label" id="starLabel">完成一句點亮一顆星 ⭐</div>
  </div>

  <!-- MAIN CARD -->
  <div class="card-container">
    <div class="card" id="mainCard">
      <div class="card-top">
        <span class="card-num" id="cardNum">句 1 / 10</span>
        <span class="tts-badge" onclick="testTTS()">
          <span class="tts-dot" id="ttsDot"></span> TTS
        </span>
      </div>

      <!-- 語塊區 -->
      <span class="sec-label">點語塊聽發音</span>
      <div class="chunks-area" id="chunksArea"></div>

      <!-- 整句 -->
      <div class="full-sent" id="fullSent"></div>

      <!-- 骨架看完 → 跳語塊彈藥 -->
      <button class="btn-jump-ammo" id="jumpAmmoBtn" onclick="jumpToAmmo(currentGlobalIdx())" style="width:100%;margin-bottom:12px;padding:9px;border-radius:11px;border:none;background:var(--misora);color:white;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">
        🔫 看懂骨架了 → 背這句的語塊模組
      </button>

      <!-- YouGlish 網址（可複製） -->
      <div class="yg-url-box" id="yg-url-box">
        <span class="yg-url-label">📺 YouGlish：</span>
        <span class="yg-url-text" id="yg-url-text" onclick="copyYGUrl()"></span>
        <span class="yg-copy-btn" onclick="copyYGUrl()">複製</span>
      </div>

      <!-- 翻譯輸入 -->
      <span class="sec-label">你的翻譯</span>
      <textarea class="trans-input" id="userInput" placeholder="輸入中文或英文翻譯…"></textarea>

      <!-- 造句區 -->
      <div class="make-section">
        <div class="make-toggle" onclick="toggleMake()">
          <span class="make-icon" id="makeIcon">▶</span>
          <span class="make-toggle-label">✏️ 自己造句挑戰</span>
        </div>
        <div class="make-body" id="makeBody">
          <div class="make-hint-text">參考句型，換掉名字或主詞，打出屬於你的句子：</div>
          <div class="make-pattern-box" id="makePatternBox"></div>
          <div class="expand-map" id="expandMap" style="display:none"></div>
          <textarea class="make-free-input" id="makeFreeInput" placeholder="打打看…"></textarea>
          <div class="make-result" id="makeResult" style="display:none"></div>
          <button class="btn-check-make" onclick="checkMakeFree()">核對句型</button>
          <button class="btn-reset-make" onclick="resetMakeFree()">清空重打</button>
        </div>
      </div>

      <!-- 英西同源槓桿（逐句） -->
      <div id="cogBox"></div>

      <!-- 看答案 -->
      <div class="answer-box" id="answerBox">
        <div class="answer-tabs">
          <button class="a-tab" onclick="switchLang('zh')">中文</button>
          <button class="a-tab" onclick="switchLang('en')">EN</button>
        </div>
        <div class="answer-content">
          <div class="a-lang" id="aZh">
            <div class="a-text" id="aTextZh"></div>
            <div class="a-note" id="aNoteZh"></div>
          </div>
          <div class="a-lang" id="aEn">
            <div class="a-text" id="aTextEn"></div>
            <div class="a-note" id="aNoteEn"></div>
          </div>
        </div>
      </div>

      <!-- 文法情境提示（看完答案後出現） -->
      <div id="grammarTip" style="display:none;margin:10px 0 2px"></div>

      <div class="btn-row">
        <button class="btn btn-reveal" onclick="revealAnswer()">👀 看答案</button>
        <button class="btn btn-next" id="nextBtn" onclick="nextCard()">下一句 →</button>
      </div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="prevCard()">‹ 上一句</button>
      <span class="nav-count" id="navCount">1 / 10</span>
      <button class="nav-btn" id="nextBtnB" onclick="nextCard()">下一句 ›</button>
    </div>
  </div>

  <!-- COMPLETE SCREEN -->
  <div class="complete-screen" id="completeScreen">
    <div class="complete-stars" id="completeStars"></div>
    <div class="complete-title" id="completeTitle"></div>
    <div class="complete-sub" id="completeSub"></div>
    <div class="complete-cheer" id="completeCheer"></div>

    <div class="stats">
      <div class="stat-box"><div class="stat-num" id="finalScore">0</div><div class="stat-lbl">翻譯答對</div></div>
      <div class="stat-box"><div class="stat-num" id="finalMake">0</div><div class="stat-lbl">造句成功</div></div>
      <div class="stat-box"><div class="stat-num" id="finalWords">0</div><div class="stat-lbl">彈藥解鎖</div></div>
    </div>

    <div class="ep-cognate-box">
      <div class="ec-title">🧠 本集英西同源詞</div>
      <div class="ec-sub">零成本的單字，看了就會！</div>
      <div class="ec-list" id="ecList"></div>
    </div>

    <button class="btn-restart" onclick="restartEp()">🔁 重來一次</button>
    <button class="btn-next-ep" id="nextEpBtn" onclick="goNextEp()">下一集 →</button>
  </div>

  <!-- ── 語塊彈藥庫 ── -->
  <div class="ammo-wrap card-container">
    <div class="ammo-book-top" onclick="toggleAmmo()" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div class="pb-book-title">🔫 語塊彈藥庫 <span id="ammoCount">0</span> / 30</div>
        <div class="pb-book-sub">完成句子自動解鎖，點擊展開複習</div>
      </div>
      <span id="ammoToggle" style="color:white;font-size:12px;font-weight:800">▼ 展開</span>
    </div>
    <div id="ammoBody" class="ammo-body">
      <div id="ammoEntries"></div>
    </div>
  </div>

  <!-- ── 英西同源詞庫總覽 ── -->
  <div class="cognate-section card-container">
    <div class="cog-header" onclick="toggleCogLibrary()" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">
      <span>📚 英西同源詞庫</span>
      <span id="cogLibToggle" style="font-size:11px;font-weight:700">▼ 展開</span>
    </div>
    <div class="cog-sub">零學習成本！看英文秒猜西語意思</div>
    <div id="cogLibraryBody" class="cog-library-body"></div>
  </div>

  <!-- ── 文法酷庫 Modal ── -->
  <div id="grammarModal" onclick="closeGrammarModal()">
    <div class="grammar-modal-box" onclick="event.stopPropagation()">
      <button class="grammar-modal-close" onclick="closeGrammarModal()">✕</button>
      <div id="grammarModalContent"></div>
    </div>
  </div>

  <!-- ── 陌生詞彙收藏區 ── -->
  <div class="vocab-wrap card-container">
    <div class="ammo-book-top" onclick="toggleVocabBox()" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,var(--benikake),#5A6BA8)">
      <div>
        <div class="pb-book-title">⭐ 陌生詞彙收藏 <span id="vocabCount">0</span></div>
        <div class="pb-book-sub">點語塊或同源詞旁的 ＋ 收藏起來</div>
      </div>
      <span id="vocabToggle" style="color:white;font-size:12px;font-weight:800">▼ 展開</span>
    </div>
    <div id="vocabBody" class="ammo-body">
      <div id="vocabEntries"></div>
    </div>
  </div>

  <div style="text-align:center;margin:18px 0 6px;">
    <button class="nav-btn" onclick="clearLS()" style="font-size:11px;color:var(--err);border-color:var(--err)">清除所有學習紀錄</button>
  </div>

  <script src="episodes.js?v=20260701"></script>
  <script src="ammo.js?v=20260701"></script>
  <script src="cognates.js?v=20260701"></script>
  <script src="grammar.js?v=20260701"></script>
  <script src="script.js?v=20260701"></script>
</body>
</html>
