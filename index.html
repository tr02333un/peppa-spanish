<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peppa Pig 西語語塊庫</title>
    <!-- 1. 強制在網頁內引入 Tailwind CSS，一秒把白網頁變超美藍色 -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f7ff; -webkit-tap-highlight-color: transparent; }
        /* 徹底隱藏 details 預設的醜箭頭與白底，啟動流暢伸縮 */
        summary::-webkit-details-marker { display: none; }
        summary { list-style: none; outline: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800">

    <!-- 頂部導覽列：極簡舒壓藍 -->
    <header class="bg-blue-600 text-white text-center py-4 shadow-sm sticky top-0 z-50">
        <h1 class="text-lg font-bold tracking-wide">🐷 Peppa Pig 西語語塊庫</h1>
        <p class="text-xs text-blue-100 mt-0.5">ADHD 專屬 · 語塊伸縮解鎖 · 亮星成就機制</p>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-grow p-4 max-w-md mx-auto w-full space-y-4">
        
        <!-- 區塊一：真實聲音播放器 (YouGlish 官方安全嵌入，徹底解決錯誤 153) -->
        <section class="bg-white rounded-2xl p-4 shadow-sm border border-blue-100">
            <h2 class="text-xs font-semibold text-blue-800 mb-2 flex items-center gap-1">
                <span>📺</span> 真實人類卡通發音 (YouGlish 驅動)
            </h2>
            <div class="aspect-video bg-blue-50 rounded-xl flex items-center justify-center border-2 border-dashed border-blue-200 p-2">
                <div id="yg-widget-container" class="text-blue-500 text-xs text-center w-full h-full flex items-center justify-center">
                    點擊下方「🔊 語塊發音」，在此載入真實聲音...
                </div>
            </div>
        </section>

        <!-- 區塊二：多巴胺星星計數器 -->
        <div class="bg-white p-3 rounded-xl border border-blue-50 flex justify-between items-center text-xs">
            <span class="text-slate-500">當前進度：<b>S1 · E1~E3 精華彈藥</b></span>
            <div class="flex items-center gap-1 font-bold text-blue-600">
                <span>成就解鎖：</span>
                <span id="star-rating" class="text-amber-400 text-sm tracking-wider">☆☆☆☆☆</span>
            </div>
        </div>

        <!-- 區塊三：純粹的語塊句型貨架（每句自帶獨立伸縮寶箱） -->
        <section id="chunks-container" class="space-y-4">
            <!-- 由下方 JS 自動渲染 -->
        </section>

    </main>

    <footer class="text-center py-4 text-[10px] text-slate-400 bg-white border-t border-blue-50">
        Made for ADHDers with 💙
    </footer>

    <!-- 2. 大腦邏輯與精華彈藥庫合體，絕不漏氣 -->
    <script>
        const AMMO_DATA = [
            {
                id: "chunk_1",
                episode: "🎯 一發命中",
                tag: "佩佩豬原句",
                text: "Yo soy Peppa Pig.",
                translation: "我是佩佩豬。",
                searchKeyword: "Yo soy Peppa Pig",
                title: "💥 核心彈藥（點擊伸縮）",
                notes: [
                    "<b>Yo soy Peppa Pig.</b>",
                    "<span class='text-blue-600 font-bold'>🔵 Ser</span> (動詞原型：是)",
                    "我是佩佩豬。",
                    "💡 <b>成功解鎖</b>：把 Yo 遮住直接單用 <b>Soy</b> 也是一模一樣的意思！例如：<i>Soy Peppa.</i>"
                ]
            },
            {
                id: "chunk_2",
                episode: "🔥 火力全開",
                tag: "日常對話",
                text: "Yo soy la mamá de (cuatro niños).",
                translation: "我是四個孩子的媽媽。",
                searchKeyword: "Yo soy la mama",
                title: "💥 核心彈藥（點擊伸縮）",
                notes: [
                    "<b>Yo soy la mamá de cuatro niños.</b>",
                    "<span class='text-blue-600 font-bold'>🔵 Ser</span> (動詞原型：是)",
                    "我是四個孩子的媽媽。"
                ]
            },
            {
                id: "chunk_3",
                episode: "🔥 火力全開",
                tag: "日常對話",
                text: "Yo soy (tu professora) de español.",
                translation: "我是你的西語老師。",
                searchKeyword: "tu professora",
                title: "💥 核心彈藥（點擊伸縮）",
                notes: [
                    "<b>Yo soy tu professora de español.</b>",
                    "<span class='text-blue-600 font-bold'>🔵 Ser</span> (動詞原型：是)",
                    "我是你的西語老師。",
                    "👉 <b>👑 Tú eres + 身分</b> = 你是某人。（💡 <b>estudiante</b> 與英文 student 同源！）",
                    "👉 <b>📦 Tu + 物品</b> = 你的東西。（例如：<i>Tu professora es buena.</i>）"
                ]
            }
        ];

        let completedChunks = new Set();

        window.onload = function() {
            renderChunks();
        };

        function renderChunks() {
            const container = document.getElementById('chunks-container');
            if(!container) return;
            container.innerHTML = '';

            AMMO_DATA.forEach(chunk => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl shadow-sm border border-blue-100 space-y-2";
                card.innerHTML = `
                    <div class="flex justify-between items-center text-[10px] text-slate-400 font-mono">
                        <span class="bg-blue-50 text-blue-500 px-2 py-0.5 rounded-full font-sans font-bold">${chunk.tag}</span>
                        <span>${chunk.episode}</span>
                    </div>
                    
                    <div class="w-full bg-slate-50 p-3 rounded-xl border border-slate-100 relative pr-20">
                        <p class="font-bold text-base text-slate-900 leading-relaxed">${chunk.text}</p>
                        <p class="text-xs text-slate-500 mt-1">${chunk.translation}</p>
                        
                        <button onclick="triggerAction('${chunk.id}', '${chunk.searchKeyword}')" class="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-700 text-white text-xs px-2.5 py-2 rounded-xl transition active:scale-95 shadow-sm font-bold flex flex-col items-center gap-0.5">
                            <span>🔊</span><span>語塊發音</span>
                        </button>
                    </div>

                    <details class="bg-blue-50/40 border border-dashed border-blue-300 rounded-xl transition-all duration-200">
                        <summary class="p-2.5 text-xs font-bold text-blue-900 cursor-pointer flex justify-between items-center select-none active:bg-blue-100/50 rounded-xl">
                            <span class="flex items-center gap-1">${chunk.title}</span>
                            <span class="text-[10px] text-blue-600 bg-white border border-blue-200 px-1.5 py-0.5 rounded-md shadow-sm">展開 / 收起</span>
                        </summary>
                        <div class="px-3 pb-3 pt-1 text-xs space-y-2 border-t border-dashed border-blue-200/60 mt-0.5">
                            ${chunk.notes.map(note => `<p class="text-slate-600 leading-relaxed">${note}</p>`).join('')}
                        </div>
                    </details>
                `;
                container.appendChild(card);
            });
        }

        function triggerAction(id, keyword) {
            const widget = document.getElementById('yg-widget-container');
            if (widget) {
                // 直接向 YouGlish 請求最安全的官方外嵌，徹底解決黑框與錯誤 153
                widget.innerHTML = `<iframe id="yg-iframe" class="w-full h-full rounded-xl shadow-inner" src="https://youglish.com{encodeURIComponent(keyword)}?bgcol=f0f7ff&mute=0" frameborder="0" allow="autocomplete; encrypted-media; picture-in-picture"></iframe>`;
            }
            completedChunks.add(id);
            updateStars();
        }

        function updateStars() {
            const starLabel = document.getElementById('star-rating');
            if (!starLabel) return;
            const count = completedChunks.size;
            let stars = '';
            for(let i = 0; i < 5; i++) {
                stars += (i < count) ? '★' : '☆';
            }
            starLabel.textContent = stars;
        }
    </script>
</body>
</html>
