<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐷 佩佩豬學西語 S1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="header-title">🐷 佩佩豬<span>學西語</span></div>
  <div class="ep-badge" id="epBadge">S1 · E1 · 泥巴坑</div>
  <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px">
    <span style="font-size:10px;font-weight:700;color:#8AABB8">成就解鎖：</span>
    <span id="star-rating" style="font-size:16px;color:#F59E0B;letter-spacing:2px;transition:all .3s">☆☆☆☆☆☆☆☆☆☆</span>
  </div>
</div>

<div class="season-nav" id="seasonNav"></div>

<div class="star-progress">
  <div class="star-row" id="starRow"></div>
  <div class="star-label" id="starLabel">完成一句點亮一顆星 ⭐</div>
</div>

<div class="card-container">
  <div class="card" id="mainCard">
    <div class="card-top">
      <span class="card-num" id="cardNum">句 1</span>
      <span class="tts-badge" onclick="testTTS()"><span class="tts-dot" id="ttsDot"></span>點語塊 → 西語朗讀</span>
    </div>
    <div class="chunks-area" id="chunksArea"></div>
    <div class="full-sent" id="fullSent"></div>
    <div style="text-align:right;margin:-6px 0 10px">
      <button id="yg-card-btn" style="font-size:11px;font-weight:800;color:var(--misora);background:white;border:1.5px solid var(--usumizu);border-radius:8px;padding:5px 13px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px" onmouseover="this.style.borderColor='var(--mizu)'" onmouseout="this.style.borderColor='var(--usumizu)'">
        🔊 聽真人：<span class="yg-label" style="color:var(--konpeki)">...</span>
      </button>
    </div>

    <span class="sec-label">✏️ 試著翻譯這句話</span>
    <textarea class="trans-input" id="userInput" placeholder="輸入中文或英文翻譯…" rows="2"></textarea>

    <div class="make-section">
      <div class="make-toggle" onclick="toggleMake()">
        <span class="make-icon" id="makeIcon">▶</span>
        <span class="make-toggle-label">✍️ 自己造一個句子試試？</span>
      </div>
      <div class="make-body" id="makeBody">
        <div class="make-hint-text" id="makeHintText">照這個句型，換成你自己的詞 👇</div>
        <div class="make-pattern-box" id="makePatternBox"></div>
        <!-- 心智圖換詞區（有 expand 資料才顯示）-->
        <div class="expand-map" id="expandMap" style="display:none"></div>
        <!-- 自由輸入 -->
        <textarea class="make-free-input" id="makeFreeInput" placeholder="e.g. Yo soy Vera …" rows="2"></textarea>
        <div class="make-result" id="makeResult" style="display:none"></div>
        <button class="btn-check-make" onclick="checkMakeFree()">✅ 核對句型</button>
        <button class="btn-reset-make" onclick="resetMakeFree()">🔄 清空</button>
      </div>
    </div>

    <div class="answer-box" id="answerBox">
      <div class="answer-tabs">
        <button class="a-tab on" onclick="switchLang('zh')">🇹🇼 中文</button>
        <button class="a-tab"    onclick="switchLang('en')">🇺🇸 English</button>
      </div>
      <div class="answer-content">
        <div class="a-lang on" id="aZh"><div class="a-text" id="aTextZh"></div><div class="a-note" id="aNoteZh"></div></div>
        <div class="a-lang"    id="aEn"><div class="a-text" id="aTextEn"></div><div class="a-note" id="aNoteEn"></div></div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-reveal" onclick="revealAnswer()">👀 看答案</button>
      <button class="btn btn-next" id="nextBtn" onclick="nextCard()">下一句 →</button>
    </div>
  </div>
</div>

<div class="nav-row">
  <button class="nav-btn" id="prevBtn" onclick="prevCard()">← 上一句</button>
  <span class="nav-count" id="navCount">1 / 10</span>
  <button class="nav-btn" id="nextBtnB" onclick="nextCard()">下一句 →</button>
</div>

<div class="complete-screen" id="completeScreen">
  <div class="complete-stars" id="completeStars"></div>
  <div class="complete-title" id="completeTitle">一集完成！</div>
  <div class="complete-sub" id="completeSub"></div>

  <!-- 統計三格 -->
  <div class="stats">
    <div class="stat-box"><div class="stat-num" id="finalScore">0</div><div class="stat-lbl">句翻對</div></div>
    <div class="stat-box"><div class="stat-num" id="finalMake">0</div><div class="stat-lbl">造句成功</div></div>
    <div class="stat-box"><div class="stat-num" id="finalWords">0</div><div class="stat-lbl">新單字</div></div>
  </div>

  <!-- 本集英西同源預覽 -->
  <div class="ep-cognate-box" id="epCognateBox">
    <div class="ec-title">🔗 你已經會了這些同源詞！</div>
    <div class="ec-sub">英文底子讓你秒懂西語</div>
    <div class="ec-list" id="ecList"></div>
  </div>

  <!-- 鼓勵語 -->
  <div class="complete-cheer" id="completeCheer"></div>

  <div style="display:flex;gap:8px;justify-content:center;margin-top:18px">
    <button class="btn-restart" onclick="restartEp()">🔄 再練一次</button>
    <button class="btn-next-ep" id="nextEpBtn" onclick="goNextEp()">下一集 →</button>
  </div>
</div>

<!-- ② 語塊彈藥庫 -->
<div class="passbook-wrap ammo-wrap" id="ammoWrap" style="margin-top:12px">
  <div class="passbook-header" onclick="toggleAmmo()">
    <div class="passbook-title">🔫 語塊彈藥庫 <span class="passbook-count" id="ammoCount">0</span></div>
    <div class="passbook-toggle" id="ammoToggle">▼ 展開</div>
  </div>
  <div class="passbook-body" id="ammoBody">
    <div class="ammo-book-top">
      <div class="pb-logo">💥</div>
      <div>
        <div class="pb-book-title">佩佩豬西語彈藥庫</div>
        <div class="pb-book-sub">核心彈藥 → 武器改裝 → 實戰射擊</div>
      </div>
    </div>
    <div id="ammoEntries"><div class="passbook-empty">還沒有彈藥 — 完成句子後自動解鎖！</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="episodes.js"></script>
<script src="ammo.js"></script>
<script src="cognates.js"></script>
<script src="script.js"></script>
</body>
</html>
